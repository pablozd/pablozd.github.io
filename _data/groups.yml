- title: TALK
  url: https://talk-group.org/
  img: assets/img/groups/talk-group.png
  description:
    es-ar: Grupo de investigación en SADAF que estudia cuestiones de significado lingüístico desde perspectivas lingüísticas y filosóficas.
    en-us: Research group at SADAF investigating questions of language meaning from both linguistic and philosophical perspectives.

- title: Romania Nova
  url: https://sites.google.com/view/romania-nova/página-principal/español
  img: assets/img/groups/romania-nova.jpg
  description:
    es-ar: Comisión creada en 2005 para el estudio comparativo, formal y cuantitativo de la sintaxis y la morfología de las variedades románicas habladas en América (español americano, portugués brasilero y francés canadiense).
    en-us: Commission established in 2005 for the formal, quantitative and comparative study of the syntax and morphology of Romance varieties spoken in the Americas (American Spanish, Brazilian Portuguese and Canadian French).
