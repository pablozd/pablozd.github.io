    tag: "LaTeX · TikZ"
    description:
      es-ar: Marcado sintáctico sobre texto corrido. Sin árboles.
      en-us: Syntactic annotation over running text. No trees.
    actions:
      - label:
          es-ar: Docs
          en-us: Docs
        url: https://sintaxismark.pablozd.ar
        style: primary
      - label:
          es-ar: ↓ .sty
          en-us: ↓ .sty
        url: "#"
        style: outline
      - label:
          es-ar: GitHub
          en-us: GitHub
        url: https://github.com/pablozd/sintaxismark
        style: outline
  - title: Beamer templates
    tag: "LaTeX · Beamer"
    description:
      es-ar: Plantillas para presentaciones académicas.
      en-us: Templates for academic presentations.
    actions:
      - label:
          es-ar: ↓ .zip
          en-us: ↓ .zip
        url: "#"
        style: primary
  - title: Paper template
    tag: "LaTeX · Article"
